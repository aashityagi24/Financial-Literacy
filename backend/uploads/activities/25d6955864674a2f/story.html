<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sia and the Silver Circle story book</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      background: url('bg.jpg') no-repeat center/cover;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #book-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      box-sizing: border-box;
      gap: 20px;
    }

    .page {
      flex: 0 0 45%;
      background: white;
      border: 2px solid #333;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      background: #6b5b95;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Audio button (only on right page) */
    .audio-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 12px;
      font-size: 0.95rem;
      border-radius: 999px;
      background: rgba(107, 91, 149, 0.95);
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      z-index: 5;
      margin: 0;
    }

    .audio-btn.playing {
      background: rgba(36, 169, 90, 0.95);
    }

    .audio-btn:disabled {
      background: rgba(200,200,200,0.95);
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="book-container"></div>
  <div>
    <button id="prev-btn">Previous</button>
    <button id="next-btn">Next</button>
  </div>

  <script>
    // Page images
    const pages = [
      'images/1.webp',
      'images/2.webp',
      'images/3.webp',
      'images/4.webp',
      'images/5.webp',
      'images/6.webp',
      'images/7.webp',
      'images/8.webp',
      'images/9.webp',
      'images/10.webp',
      'images/11.webp',
      'images/12.webp',
      'images/13.webp',
      'images/14.webp',
      'images/15.webp',
      'images/16.webp',
      'images/17.webp'
    ];

    // Audio files are sequential:
    // audio/1.m4a, audio/2.m4a, audio/3.m4a, ...
    // Mapping used (one audio per two-page spread, button on right page only):
    //   Spread 2–3  => audio/1.m4a
    //   Spread 4–5  => audio/2.m4a
    //   Spread 6–7  => audio/3.m4a
    //   ...
    // Title page (page 1) has no audio.
    const audioFolder = 'audio';

    function spreadNumberForLeftPageIndex(leftIdx) {
      // leftIdx is 0-based index of the LEFT page in the spread.
      // leftIdx=1 => page 2 => spread 1
      // leftIdx=3 => page 4 => spread 2
      const leftPageNum = leftIdx + 1; // 1-based page number
      return Math.floor(leftPageNum / 2); // 2->1, 4->2, 6->3...
    }

    function spreadAudioFor(leftIdx, rightIdx) {
      // No audio for title page or if there is no right page
      if (leftIdx <= 0) return null; // index 0 = title page, spreads start at leftIdx=1
      if (rightIdx >= pages.length) return null;

      const spreadNum = spreadNumberForLeftPageIndex(leftIdx);
      if (spreadNum <= 0) return null;

      return `${audioFolder}/${spreadNum}.m4a`;
    }

    // --- Tests / assertions ---
    console.assert(Array.isArray(pages) && pages.length > 0, 'pages[] must be a non-empty array');
    console.assert(spreadAudioFor(1, 2) === 'audio/1.m4a', 'Spread 2–3 should map to audio/1.m4a');
    console.assert(spreadAudioFor(3, 4) === 'audio/2.m4a', 'Spread 4–5 should map to audio/2.m4a');
    console.assert(spreadAudioFor(0, 1) === null, 'Title page should have no audio');

    // Shared audio player (only one plays at a time)
    const audioPlayer = new Audio();
    audioPlayer.preload = 'none';

    let currentIndex = 0; // 0 = title page only, 1+ = two-page spread starting index
    let playingAudioKey = null; // e.g. "2-3" spread key
    let activeAudioBtn = null;

    const container = document.getElementById('book-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    console.assert(container && prevBtn && nextBtn, 'Required DOM elements not found');

    function setButtonState(btn, isPlaying) {
      if (!btn) return;
      btn.classList.toggle('playing', isPlaying);
      btn.textContent = isPlaying ? 'Pause' : 'Audio';
    }

    function stopAudio() {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      playingAudioKey = null;
      setButtonState(activeAudioBtn, false);
      activeAudioBtn = null;
    }

    function playOrToggleAudio(audioSrc, audioKey, btn) {
      if (!audioSrc) return;

      // Toggle same spread
      if (playingAudioKey === audioKey && !audioPlayer.paused) {
        stopAudio();
        return;
      }

      // Switching spreads
      stopAudio();

      playingAudioKey = audioKey;
      activeAudioBtn = btn;
      setButtonState(activeAudioBtn, true);

      audioPlayer.src = audioSrc;
      const p = audioPlayer.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => {
          // Autoplay blocked or file missing
          stopAudio();
        });
      }
    }

    audioPlayer.addEventListener('ended', () => {
      playingAudioKey = null;
      setButtonState(activeAudioBtn, false);
      activeAudioBtn = null;
    });

    function createPageElement(idx, showAudio, audioSrc = null, audioKey = null) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      const img = document.createElement('img');
      img.src = pages[idx];
      img.alt = idx === 0 ? 'Title Page' : `Page ${idx + 1}`;
      pageDiv.appendChild(img);

      // Audio button ONLY on the right page
      if (showAudio) {
        const audioBtn = document.createElement('button');
        audioBtn.className = 'audio-btn';
        audioBtn.type = 'button';
        audioBtn.textContent = 'Audio';
        audioBtn.disabled = !audioSrc;

        audioBtn.addEventListener('click', () => {
          playOrToggleAudio(audioSrc, audioKey, audioBtn);
        });

        pageDiv.appendChild(audioBtn);
      }

      return pageDiv;
    }

    function renderPages() {
      // Stop audio when turning pages
      stopAudio();

      container.innerHTML = '';

      if (currentIndex === 0) {
        // Title page alone (no audio)
        container.appendChild(createPageElement(0, false));
      } else {
        const leftIdx = currentIndex;
        const rightIdx = currentIndex + 1;

        // Left page (no audio)
        if (leftIdx < pages.length) {
          container.appendChild(createPageElement(leftIdx, false));
        }

        // Right page (audio button for the spread)
        if (rightIdx < pages.length) {
          const audioSrc = spreadAudioFor(leftIdx, rightIdx);
          const audioKey = `${leftIdx + 1}-${rightIdx + 1}`;
          container.appendChild(createPageElement(rightIdx, true, audioSrc, audioKey));
        }
      }

      // UI tests
      const audioBtns = container.querySelectorAll('.audio-btn');
      if (currentIndex === 0) {
        console.assert(audioBtns.length === 0, 'Title page should not show an audio button');
      } else {
        const shouldHaveRightPage = currentIndex + 1 < pages.length;
        console.assert(audioBtns.length === (shouldHaveRightPage ? 1 : 0), 'Audio button should appear only on the right page');

        if (shouldHaveRightPage) {
          const expectedAudio = spreadAudioFor(currentIndex, currentIndex + 1);
          console.assert(audioBtns[0].disabled === !expectedAudio, 'Audio button disabled state should match spread audio availability');
        }
      }

      // Navigation button states
      prevBtn.disabled = currentIndex === 0;
      if (currentIndex === 0) {
        nextBtn.disabled = pages.length < 2;
      } else {
        nextBtn.disabled = currentIndex + 2 >= pages.length;
      }
    }

    prevBtn.addEventListener('click', () => {
      if (currentIndex === 1) {
        currentIndex = 0;
      } else if (currentIndex > 1) {
        currentIndex -= 2;
      }
      renderPages();
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex === 0) {
        currentIndex = 1;
      } else if (currentIndex + 2 < pages.length) {
        currentIndex += 2;
      }
      renderPages();
    });

    renderPages();
  </script>
</body>
</html>
