<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Equation & Relations • MCQ Quiz</title>
<style>
:root{--bg1:#e8f7ee;--bg2:#ffe6f7;--bg3:#e8f3ff;--panel:#ffffff;--ink:#0f172a}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));color:var(--ink)}
.container{max-width:980px;margin:auto;padding:24px 16px 40px;text-align:center}
h1{margin:0 0 8px;font-size:28px;text-shadow:0 1px 0 #fff}
.hidden{display:none}
.panel{position:relative;margin:14px auto;padding:18px 18px 16px;border-radius:18px;background:var(--panel);border:1px solid #e5e7eb;box-shadow:0 14px 26px rgba(15,23,42,.18),inset 0 2px 0 rgba(255,255,255,.9)}
.panel-title{margin:0 0 8px;font-size:18px;font-weight:800}
ul.instructions{text-align:left;max-width:820px;margin:8px auto 4px;padding-left:18px}
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:10px}
label{display:block;font-weight:700;color:#334155;margin-bottom:6px;font-size:14px}
select{appearance:none;-webkit-appearance:none;padding:10px 14px;border-radius:12px;border:1px solid #d1d5db;background:linear-gradient(180deg,#fff,#f3f4f6);box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 6px 12px rgba(15,23,42,.20);min-width:170px;font-weight:600;padding-right:40px}
button{padding:10px 20px;border:none;border-radius:16px;cursor:pointer;font-size:16px;font-weight:800;margin:6px;color:#0f172a;background:linear-gradient(to bottom,#ffffff,#e5e7eb);box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 10px 18px rgba(15,23,42,.35)}
button.brand{background:linear-gradient(to bottom,#bef264,#34d399)}
button.pink{background:linear-gradient(to bottom,#fbcfe8,#f472b6)}
button.blue{background:linear-gradient(to bottom,#bfdbfe,#60a5fa)}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px}
#progress{font-weight:800;font-size:16px}
.alert{margin:8px auto;padding:8px 10px;border-radius:10px;background:#fee2e2;border:1px solid #fecaca;color:#7f1d1d;font-weight:600;max-width:820px}
.qtext{font-size:16px;margin:4px 0 8px}
.options-wrap{max-width:820px;margin:0 auto}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.option-card{position:relative;padding:11px 12px;border-radius:14px;border:1px solid #e5e7eb;background:linear-gradient(180deg,#ffffff,#f3f4f6);box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 7px 14px rgba(15,23,42,.25);cursor:pointer;text-align:left;font-weight:600;font-size:15px}
.option-card.selected{border-color:#4b5563;background:linear-gradient(180deg,#fff7d6,#fde68a)}
.option-radio{width:16px;height:16px;border-radius:999px;border:2px solid #9ca3af;display:inline-block;margin-right:8px;vertical-align:middle;background:#fff}
.review-item{margin:14px auto;padding:12px;border-radius:14px;border:1px dashed #d1d5db;background:#fff;max-width:860px;text-align:left}
.review-question{font-weight:700;margin-bottom:6px}
.review-options{list-style:none;padding-left:0;margin:6px 0 0}
.review-options li{padding:6px 9px;margin:5px 0;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;display:flex;align-items:center;gap:6px;font-size:14px}
.opt-correct{border-color:#10b981;background:#ecfdf5}
.opt-wrong{border-color:#ef4444;background:#fef2f2}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;font-size:13px;font-weight:800}
.badge.ok{background:#22c55e;color:#fff}
.badge.no{background:#ef4444;color:#fff}
.tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 6px;border-radius:999px;background:#e5e7eb;color:#4b5563;margin-left:4px}
</style>
</head>
<body>
<div class="container">
<h1>Equation & Relations • MCQ Quiz</h1>

<div id="home">
<div class="panel">
<h3 class="panel-title">Instructions</h3>
<ul class="instructions">
<li>Choose difficulty and mode.</li>
<li>Each run creates <b>10 fresh questions</b>.</li>
<li>Use Previous and Next to move between questions.</li>
<li>No instant feedback. Review appears at the end.</li>
</ul>
<div class="controls">
<div>
<label for="difficulty">Difficulty</label>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="difficult">Difficult</option>
</select>
</div>
<div>
<label for="operation">Mode</label>
<select id="operation">
<option value="both">All (Mix)</option>
<option value="mul">Multiplication</option>
<option value="div">Division</option>
<option value="divalg">Division Algorithm</option>
<option value="rel">Relations</option>
</select>
</div>
</div>
</div>
<button id="startBtn" class="brand">Start Quiz</button>
</div>

<div id="quiz" class="hidden">
<div class="top-bar">
<button id="homeBtn" class="blue">Home</button>
<span id="progress">Question 1 / 10</span>
<div>
<button id="prevBtn" class="blue">Previous</button>
<button id="nextBtn" class="pink">Next</button>
</div>
</div>

<div id="inlineAlert" class="alert hidden">Please choose an option.</div>
<div id="questionArea"></div>
<div id="optionsArea" class="options-wrap"></div>
</div>

<div id="result" class="hidden">
<h2 id="score"></h2>
<div id="reviewIntro" class="hidden">Review your incorrect answers:</div>
<div id="reviewList"></div>
<div style="margin-top:10px;">
<button id="newSetBtn" class="brand">New 10 Questions</button>
<button id="restartBtn" class="blue">Back to Home</button>
</div>
</div>
</div>

<script>
function Engine(){
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function make(){
const a=rand(2,12),b=rand(2,12)
return {stem:`Solve: ${a} × ${b} = ?`,options:[a*b,a*b+1,a*b-1,a*b+2],correctIndex:0}
}
return{generate:({count})=>Array.from({length:count},make)}
}

const engine=Engine()
let questions=[],answers=[],current=0

const homeDiv=document.getElementById('home')
const quizDiv=document.getElementById('quiz')
const resultDiv=document.getElementById('result')
const questionEl=document.getElementById('questionArea')
const optionsEl=document.getElementById('optionsArea')
const progressEl=document.getElementById('progress')
const alertEl=document.getElementById('inlineAlert')

function buildQuestions(){
const raw=engine.generate({count:10})
questions=raw.map(q=>({text:q.stem,options:q.options,answer:q.correctIndex}))
answers=new Array(questions.length).fill(null)
current=0
}

function startQuiz(){
buildQuestions()
homeDiv.classList.add('hidden')
quizDiv.classList.remove('hidden')
renderQuestion()
}

function renderQuestion(){
const q=questions[current]
progressEl.textContent=`Question ${current+1} / ${questions.length}`
questionEl.innerHTML=`<div class="panel"><div class="qtext">${q.text}</div></div>`

optionsEl.innerHTML=`<div class="panel"><div class="options-grid">${q.options.map((o,i)=>`<div class="option-card ${answers[current]===i?'selected':''}" data-index="${i}">${o}</div>`).join('')}</div></div>`

document.querySelectorAll('.option-card').forEach(c=>{
c.onclick=()=>{answers[current]=Number(c.dataset.index);renderQuestion()}
})
}

function finishQuiz(){
quizDiv.classList.add('hidden')
resultDiv.classList.remove('hidden')

let score=0
const wrongBlocks=[]

for(let i=0;i<questions.length;i++){
const q=questions[i]
const ua=answers[i]
const ca=q.answer
if(ua===ca){score++;continue}

wrongBlocks.push(`
<div class="review-item">
<div class="review-question">Q${i+1}. ${q.text}</div>
</div>
`)
}

document.getElementById('score').textContent=`Your Score: ${score} / ${questions.length}`

if(wrongBlocks.length){
document.getElementById('reviewIntro').classList.remove('hidden')
document.getElementById('reviewList').innerHTML=wrongBlocks.join('')
}else{
document.getElementById('reviewIntro').classList.add('hidden')
document.getElementById('reviewList').innerHTML=`<div class="review-item">Perfect! All answers are correct.</div>`
}

// Send score to CoinQuest
try{
window.parent.postMessage({
type:'ACTIVITY_COMPLETE',
score:score,
percentage:Math.round((score/questions.length)*100),
timeSpent:0,
correctAnswers:score,
totalQuestions:questions.length
},'*')
console.log('Score sent to CoinQuest:',score,'/',questions.length)
}catch(e){
console.error('Failed to send score:',e)
}
}

document.getElementById('startBtn').onclick=startQuiz
</script>
</body>
</html>
